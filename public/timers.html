	<title> timer thing</title>

	<link href="https://dedhk00m7fqyl.cloudfront.net/cmn/css/bootstrap151016.min.css" rel="stylesheet" charset="utf-8">
	<link href="https://dedhk00m7fqyl.cloudfront.net/ms/css/darkstrap01gz.css" rel="stylesheet" charset="utf-8">

	<script async="" src="//www.google-analytics.com/analytics.js"></script><script src="https://code.jquery.com/jquery-1.8.3.min.js" integrity="sha256-YcbK69I5IXQftf/mYD8WY0/KmEDCv1asggHpJk1trM8=" crossorigin="anonymous"></script>
	<script src="https://code.jquery.com/ui/1.12.1/jquery-ui.min.js" integrity="sha256-VazP97ZCwtekAsvgPBSUwPFKdrwD3unUfSGVYrahUqU=" crossorigin="anonymous"></script> 
	<script src="https://dedhk00m7fqyl.cloudfront.net/cmn/js/bootstrap.min.js"></script>
	<script src="https://dedhk00m7fqyl.cloudfront.net/ms/js/jquery.jclockgz.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.15.1/moment.min.js"></script>
  <div id="page">
    <script>
		
      $(document).ready(function () {
	timers = new Array();
	seconds_toggle = "show";
	showseconds = true;
	paused = false;
	pausedtime = 0;	
	var clock_options = {
		format: '%I:%M %p', // 12-hour with am/pm
		};
	$('.timebox').hide();
	$('.jclock').jclock(clock_options);
$('#setup').modal('show');
	$("#modal-close-button").live('click',function() {
		examhours =  parseInt($("#examtime_hours").val(), 10);
		if(isNaN(examhours)) {examhours = 0;}
		examminutes =  parseInt($("#examtime_minutes").val(), 10);
		if(isNaN(examminutes)) {examminutes = 0;}		
		readingminutes =  parseInt($("#readingtime_minutes").val(), 10);
		if(isNaN(readingminutes)) {readingminutes = 0;}
		if ($("#showseconds").is(':checked')) {
			showseconds = true;
		}
		
		examtime = examhours*60*60 + examminutes*60;
		readingtime = readingminutes*60;
		
		examtitle =  $("#exam-title-entry").val();
		$("#remainingTime").css("color","#fff");					
		$("#exam-title").text(examtitle);
		
		$("#buttonStart").removeClass('disabled');
		$("#buttonSetup").removeClass('disabled');				
		$("#buttonReset").addClass('disabled');
		$("#buttonPause").show();
		
		if (readingminutes > 0) {
			$("#stage_title").text("Reading Time:");
			$("#buttonStart").text("Start Reading Time").show();			
			readingflag = true;
			initializeExamTimer(readingtime,"reading");						
		} else {
			$("#stage_title").text("Exam Time:").css('color','white');
			$("#buttonStart").text("Start Exam Time").show();					
			readingflag = false;
			$("#stage_title").text("Exam Time:");
			initializeExamTimer(examtime,"exam");
		}	
		
		$('.timebox').fadeIn();
		});
		
	$("#buttonStart").live('click',function() {
		pausedtime = 0;
		$("div.footer").fadeOut();
		if (readingminutes > 0) {
			$("#buttonStart").addClass('disabled');
			$("#buttonSetup").addClass('disabled');				
			$("#buttonReset").removeClass('disabled');
			$("#buttonPause").removeClass('disabled');										
			readingminutes = 0;
			startTime = moment();			
		} else {
			if (readingflag == true) {
				$("#stage_title").text("Exam Time:").css('color','white');
				readingflag = false;			
			}
			
			startTime = moment();
      acttime = moment(startTime).add(4500,'s');
			finishTime = moment(startTime).add(examtime,'s');
					
			$("#start-time-div").show();
			$("#fin-time-div").show();
			$("#start-time").html(moment(acttime).format("h:mm a"));		
			$("#fin-time").html(moment(finishTime).format("h:mm a"));			
			$("#buttonStart").addClass('disabled');
			$("#buttonPause").removeClass('disabled');						
			$("#buttonSetup").addClass('disabled');			
			$("#buttonReset").removeClass('disabled');
		}		
		updateRemainingTime();
//	timers.push(setTimeout(updateRemainingTime(), 1000));
	});
	
	$("#buttonReset").live('click',function() {
			for (var i = 0; i < timers.length; i++)
				{
					clearTimeout(timers[i]);
				}
			$("#buttonStart").hide();
			$("#buttonPause").hide();						
			$("#buttonSetup").removeClass('disabled');				
			$("#buttonReset").addClass('disabled');
			seconds_toggle = "show";
			hour = 0;
			mins = 0;
			secs = 0;
			displayRemainingTime();
			$("#start-time-div").hide();
			$("#fin-time-div").hide();
			$("div.footer").fadeIn();			
			$('#setup').modal('show');
	});				
	$("#buttonPause").live('click',function() {
		if (paused == true) {
			paused = false;
			pausedtime = pausedtime + (new Date().getTime() - pauseStarttime);
			
			updatedFinishTime = moment(finishTime).add(pausedtime,'ms');
			$("#fin-time").html(moment(updatedFinishTime).format("h:mm a"));
			$("#fin-time").effect("highlight", {}, 1500);			
			timers.push(setTimeout(updateRemainingTime(), 1000));
			$("#buttonPause").html('<i class="icon-pause icon-white"></i> Pause');
		} else {
			pauseStarttime = new Date().getTime();			
			paused = true;
			for (var i = 0; i < timers.length; i++)
			{
				clearTimeout(timers[i]);
			}						
			$("#buttonPause").html('<i class="icon-pause icon-white"></i> Continue');
		}
	});
	
	$(window).on('beforeunload', function(){
	  return 'Leave the timer?';
	});


	// http://svn.terracotta.org/svn/forge/projects/exam/tags/release-1.0.1/src/main/webapp/js/examTimer.js

	var hour = 0;
	var mins = 0;
	var secs = 0;

	function initializeExamTimer(remainingTimeInSeconds) {
		currsec = remainingTimeInSeconds;
		currmillisec = currsec*1000;
		elapsed = 0;
		displayRemainingTime();
	}

	function updateRemainingTime() {
		var examFinished = false;
		
		var diff = (new Date().getTime() - startTime - pausedtime) - elapsed;
		$('#diffp').show();
		$('#diff').text(diff);		

		currmillisec -= 1000;
		elapsed += 1000;
		
		/* inefficient (repeats) */
		if (showseconds == false) {
			if (elapsed >= 28000 && currmillisec > 121000 && seconds_toggle == "show") {
				toggleseconds("hide");					
			}
		}
		if (currmillisec <= 121000 && seconds_toggle == "hide") {
			toggleseconds("show");					
		}

		if (currmillisec <= 0) {
			examFinished = true;
			examTimedOut();			
		}

		displayRemainingTime();

		if (!examFinished) timers.push(setTimeout(updateRemainingTime, (1000 - diff)));
	}

	function displayRemainingTime() {
		currsec = currmillisec/1000;
		momentmillisec = moment.duration(currmillisec);
		hours = momentmillisec.hours();
		
		if (hours == 0) {
			$("#remain_hours").fadeOut();
		} else {
			$("#remain_hours").fadeIn();
		}
		
		minutes = momentmillisec.minutes();
		if (hours > 0 && minutes < 10) {
			minutes = "0" + minutes;
		}
		seconds = momentmillisec.seconds();
		seconds = seconds < 10? "0" + seconds: seconds;		

		$("#remain_hours").html(hours + "<span class='tiny'> h</span>");
		$("#remain_min").html(minutes + "<span class='tiny'> min</span>");
		$("#remain_sec").html(seconds + "<span class='tiny'> s</span>");
	}
	function toggleseconds (togglesec) {
		if (togglesec == "hide") {
			$("#remain_sec").fadeOut();
			seconds_toggle = "hide";					
		} else {
			$("#remain_sec").fadeIn();
			seconds_toggle = "show";					
		}
	}
	function examTimedOut() {
		if (readingflag==true) {
			$("#stage_title").text("Reading Time Finished / Exam Time:").css('color','yellow');
			$("#buttonStart").removeClass('disabled').text("Start Exam Time");
			initializeExamTimer(examtime,"exam");
		} else {
			$("#stage_title").text("Exam Time Finished");	
			$("#remainingTime").css("color","#555");			
			$("#buttonSetup").removeClass('disabled');			
			$("#buttonReset").addClass('disabled');
		}
		$("div.footer").fadeIn();
	}


});
    </script>

<div class="container mainContent">


<div class="row">
<div class="span12">
		<h1><small>timer thingymajig</small></h1>        
<div id="controls" class="collapse in">
<div class="btn-group">
  <button class="btn btn-success hide" id="buttonStart" style="display: inline-block;">Start Exam Time</button>
  <button class="btn btn-primary hide" id="buttonPause" style="display: inline-block;"><i class="icon-pause icon-white"></i> Continue</button>  
</div>
<div class="btn-group">
  <button class="btn" data-toggle="modal" data-target="#setup" id="buttonSetup">Setup</button>
  <button class="btn btn-inverse disabled" id="buttonReset">Reset</button>
</div>
</div>
<hr>
 

<h1 id="exam-title"></h1>
<div class="row">
		<div class="span4" id="clock"><h2>Current</h2><div class="jclock mediumtext">10:48 am</div></div>
		<div class="span4 hide" id="start-time-div" style="display: none;"><h2>Earliest Leave Time</h2><div id="start-time" class="mediumtext">10:47 am</div></div>
		<div class="span4 hide" id="fin-time-div" style="display: none;"><h2>Finish</h2><div id="fin-time" class="mediumtext">11:47 am</div></div>		
</div>
		
	<h2 id="stage_title" style="color: rgb(255, 255, 255);">Exam Time:</h2>
    <div id="remainingTime" class="well" style="color: rgb(255, 255, 255);">
    		<span id="remain_hours" class="well largetext timebox" style="display: inline;">1<span class="tiny"> h</span></span> <span id="remain_min" class="well largetext timebox" style="display: inline;">00<span class="tiny"> min</span></span> <span id="remain_sec" class="well largetext timebox" style="display: inline;">00<span class="tiny"> s</span></span>
    </div>
</div><!--/span8-->
</div><!--/row-->

</div>
<div id="setup" class="modal hide fade" tabindex="-1" role="dialog" aria-labelledby="setupLabel" aria-hidden="true" style="display: none;">
  <div class="modal-header">
    <h3 id="setupLabel">Exam Timer</h3>
  </div>
  <div class="modal-body">
	  <form name="setupform" method="post" action="" class="form-inline ">
		<h4>Setup</h4>
        <p>
        <label for="exam-title-entry">Exam title (optional)
	      <input name="exam-title-entry" type="text" id="exam-title-entry" maxlength="128" class="span4" placeholder="exam title">
        </label>
        </p>
		<p>Length of exam
	    <label for="examtime_hours">hours
	      <input name="examtime_hours" type="number" id="examtime_hours" value="2" maxlength="2" min="0" max="24" class="span1">
        </label>
        and
	    <label for="examtime_minutes">minutes
	      <input name="examtime_minutes" type="number" id="examtime_minutes" value="0" maxlength="2" min="0" max="59" class="span1">
        </label>
        </p>
      </form>
      <br>
  </div>
  <div class="modal-footer">
    <button class="btn" data-dismiss="modal" aria-hidden="true" id="modal-close-button">Close</button>
  </div>

</div>
</div>
