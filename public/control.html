<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>Rambam Screen Controller</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-KK94CHFLLe+nY2dmCWGMq91rCGa5gtU4mk92HdvYe+M/SXH301p5ILy+dN9+nJOZ" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ENjdO4Dr2bkBIFxQpeoTz1HIcje39Wm4jDKdf19U8gI4ddQ3GYNS7NTKfAdVQSZe" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  </head>
  <body>
    <div id="page">
    <div id="panel">
    <center>
      <h1><span id="active" style="color: red;">●</span>Control Panel<span id="active1" style="color: red;">●</span</h1>
    <div>
    <button onclick="peerConnect()" class="btn btn-primary btn-lg">Connect to Front Screen</button>
      <button onclick="peer1Connect()" class="btn btn-primary btn-lg">Connect to Gym Screens</button>
      <div>
        <span></span>
      </div>
    <button onclick="startSlide()" class="btn btn-primary btn-lg">Picture Slideshow</button>
      <button onclick="startSlide1()" class="btn btn-primary btn-lg">Picture Slideshow</button>
      <div>
        <span></span>
      </div>
    <button onclick="startBoing()" class="btn btn-primary btn-lg">Rambam bounce</button>
      <button onclick="startBoing1()" class="btn btn-primary btn-lg">Rambam bounce</button>
      <div>
        <span></span>
      </div>
    <button onclick="black()" class="btn btn-primary btn-lg">Black Screen</button>
      <button onclick="black1()" class="btn btn-primary btn-lg">Black Screen</button>
      <div>
        <span></span>
      </div>
    <button onclick="reload()" class="btn btn-primary btn-lg">Reload site</button>
      <button onclick="reload1()" class="btn btn-primary btn-lg">Reload site</button>
    </div>
      <div>
        <span>ㅤ</span>
      </div>
      <div>
        <button onclick="logout()" class="btn btn-primary btn-lg">Logout</button>
      </div>
      </center>
    <script>
        var peer = new Peer()
        var conn;

        function startSlide() {
            conn.send({ name: "slide" });
            return
        }
        function startBoing() {
          conn.send({ name: "bounce" });
          return
        }
        function connectInfo() {
          conn.send({ name: "connect" });
          return
        }
      function black() {
          conn.send({ name: "black" });
          return
        }
        function reload() {
          conn.send({ name: "reload" });
          return
        }
      var peer1 = new Peer()
        var conn1;

        function startSlide1() {
            conn1.send({ name: "slide" });
            return
        }
        function startBoing1() {
          conn1.send({ name: "bounce" });
          return
        }
        function connectInfo1() {
          conn1.send({ name: "connect" });
          return
        }
      function black1() {
          conn1.send({ name: "black" });
          return
        }
        function reload1() {
          conn1.send({ name: "reload" });
          return
        }
        function logout() {
          location.reload()
          return
        }
        
        function peerConnect() {
          conn = peer.connect('noenboigeti-jb-rtj-ngkjrtnbiojtrngijlrtb');
            conn.on("open", () => {
                $("#active").css("color", "green");
            });
            conn.on("close", () => {
                $("#active").css("color", "red");
            });
        }
      function peer1Connect() {
          conn1 = peer1.connect('noenboigeti-jb-rtj-ngkjrtnbiojtrngijlrtcj');
            conn1.on("open", () => {
                $("#active1").css("color", "green");
            });
            conn1.on("close", () => {
                $("#active1").css("color", "red");
            });
        }
    </script>
  </div>
    <script type="text/javascript">
      var y = document.getElementById("panel");
      y.style.display = "block"
</script>
    </div>
    <center><img src="/imgs/80szt3.gif" id="gif" alt="Spinning hamster GIF" width="100%"></center>
  </body>
  <script>
    var randomNumber = Math.floor(Math.random() * (6000 - 1000 + 1) + 1000)

    var y = document.getElementById("gif");
    var x = document.getElementById("page");
    y.style.display = "block";
    x.style.display = " none";
    setTimeout(function() {
    y.style.display = "none";
    x.style.display = "block";
    }, randomNumber);
  </script>
</html>
