<html>
    <body data-bs-theme="dark">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
        <script src="https://smtpjs.com/v3/smtp.js"></script>
        <meta name="viewport" content="width=device-width, initial-scale=.75">
        <center>
            <h1>Febuary Madness</h1>
        </center>
        <center><div style="width: 50%;">
            <div class="input-group input-group-lg mb-3">
                <span class="input-group-text" id="basic-addon1">Game</span>
                <input id="teams" type="number" class="form-control" placeholder="T1" aria-label="Username" aria-describedby="basic-addon1">
                <span class="input-group-text" id="basic-addon1">VS</span>
                <input id="teams2" type="number" class="form-control" placeholder="T2" aria-label="Username" aria-describedby="basic-addon1">
              </div>
              <div class="input-group input-group-lg mb-3">
                <span class="input-group-text" id="basic-addon1">Winner</span>
                <input id="team" type="number" class="form-control" placeholder="Team" aria-label="Username" aria-describedby="basic-addon1">
              </div>
        </div></center>
          <center><button type="button" style="background-color: black;" class="btn" onclick="submit()">Submit</button></center>
          <center><h3>Instructions:</h3><span">Put the first team number in "T1",<br>then put the second team number in "T2",<br>then put the winning team in "Team",<br>finally click Submit to log the winner.<br>You can use the buttons below to keep score.</span></center>
          <center><span>ㅤ</span></center>
<center><span>Team1</span><span>ㅤ</span><span>Team2</span></center>
       <center>
        <div class="btn-group" role="group" aria-label="Basic example">
            <button type="button" onclick="T1plus()" class="btn btn-success btn-lg">+</button>
            <button type="button" id="number1" class="btn btn-secondary btn-lg" disabled>0</button>
            <button type="button" onclick="T1minus()" class="btn btn-danger btn-lg">-</button>
          </div>
          <span>ㅤ</span>
        <div class="btn-group" role="group" aria-label="Basic example">
            <button type="button" onclick="T2plus()" class="btn btn-success btn-lg">+</button>
            <button type="button" id="number2" class="btn btn-secondary btn-lg" disabled>0</button>
            <button type="button" onclick="T2minus()" class="btn btn-danger btn-lg">-</button>
          </div>
       </center>
          <script>
            function T1plus() {
                document.getElementById('number1').innerHTML++
            }
            function T1minus() {
                document.getElementById('number1').innerHTML--
            }
            function T2plus() {
                document.getElementById('number2').innerHTML++
            }
            function T2minus() {
                document.getElementById('number2').innerHTML--
            }
            function submit() {
                if ( document.getElementById('teams').value == "" || document.getElementById('teams2').value == "" || document.getElementById('team').value == "") {
                    alert("Please enter all feilds.")
                    return
                } 
                if ( document.getElementById('team').value !=  document.getElementById('teams').value  && document.getElementById('team').value !=  document.getElementById('teams2').value ) {
                    alert("The winner should be someone who is playing.")
                    return
                }
                if (document.getElementById('teams').value == document.getElementById('teams2').value) {
                    alert("A team cant play itself.")
                    return
                }
                if (+document.getElementById('teams').value >= 17 || +document.getElementById('teams2').value >= 17) {
                    alert("There isnt more than 16 teams.")
                    return
                }
                console.log(`Game: ${document.getElementById('teams').value} VS ${document.getElementById('teams2').value}`)
                console.log(`Winner: ${document.getElementById('team').value}`)

            

                const team1 = document.getElementById('teams').value

                const team2 = document.getElementById('teams2').value

                const win = document.getElementById('team').value
                
                var newUrl = `/madnesshandler/?team1=${team1}&team2=${team2}&win=${win}`;

                window.location.replace(newUrl);
                alert(`Submitted Winner. Team: ${document.getElementById('team').value}`)
            }
          </script>
    </body>
</html>
